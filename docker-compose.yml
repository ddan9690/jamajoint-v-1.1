version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: jamajoint_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/jamajoint
    networks:
      - jamajoint_network

  nginx:
    image: nginx:alpine
    container_name: jamajoint_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/jamajoint
      - ./docker/nginx/jamajoint.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - jamajoint_network

  db:
    image: mysql:8.0
    container_name: jamajoint_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jamajoint
      MYSQL_USER: jamadata
      MYSQL_PASSWORD: "J@maD@ta#Kp2026!Zx91"
      MYSQL_ROOT_PASSWORD: "Root@2026#Kuppet!9X"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - jamajoint_network

  adminer:
    image: adminer:latest
    container_name: jamajoint_adminer
    restart: unless-stopped
    networks:
      - jamajoint_network

networks:
  jamajoint_network:
    driver: bridge

volumes:
  dbdata: